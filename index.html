<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEGA BREAKOUT V18 - FIXED</title>
    <style>
        /* デザイン・レイアウト設定 */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }

        canvas { display: block; width: 100%; height: 100%; touch-action: none; }

        #title-layer { z-index: 100; cursor: pointer; }
        #equip-layer { z-index: 90; }
        .modal { z-index: 110; background: rgba(15, 23, 42, 0.98); }

        .menu-content { width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 0; box-sizing: border-box; }
        .no-pointer { pointer-events: none; }

        h1 { font-size: 32px; margin-bottom: 5px; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); text-align: center; font-weight: 800; letter-spacing: 1px; }
        .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 30px; font-weight: 600; letter-spacing: 2px; }
        .blink { font-size: 15px; animation: blinker 1.5s linear infinite; padding: 20px; color: #cbd5e1; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        
        h2 { font-size: 20px; margin: 10px 0; color: #f8fafc; }
        .stats-text { color: #38bdf8; font-size: 15px; margin: 5px 0; font-weight: bold; }
        .sub-text { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }
        
        button { font-family: inherit; outline: none; border: none; cursor: pointer; flex-shrink: 0; transition: transform 0.1s, background-color 0.2s; touch-action: manipulation; }
        button:active { transform: scale(0.97); }
        
        .equip-btn { background: #334155; color: #f8fafc; width: 85%; padding: 14px; margin: 5px 0; font-size: 14px; border-radius: 8px; font-weight: 600; display: block; }
        .gacha-box { display: flex; gap: 4%; width: 85%; margin-top: 15px; }
        .btn-gacha { flex: 1; background: #f59e0b; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        .btn-synth { flex: 1; background: #8b5cf6; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        
        .btn-start { background: #10b981; color: white; margin-top: 25px; font-size: 16px; padding: 15px; font-weight: bold; border-radius: 8px; width: 85%; display: block; }
        .btn-auto-start { background: transparent; color: #f59e0b; margin-top: 10px; margin-bottom: 20px; font-size: 14px; padding: 12px; font-weight: bold; border: 2px solid #f59e0b; border-radius: 8px; width: 85%; display: block; }
        
        #btn-auto-stop { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 24px; font-size: 14px; border-radius: 30px; font-weight: bold; z-index: 120; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .list-box { width: 90%; max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; margin-top: 10px; }
        .inv-item { background: #1e293b; border: 2px solid #334155; padding: 14px; border-radius: 8px; color: white; text-align: left; position: relative; cursor: pointer; display: block; width: 100%; box-sizing: border-box; }
        .inv-item.selected { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .inv-name { font-weight: bold; color: #f8fafc; margin-bottom: 6px; display: inline-block; width: 70%; font-size: 14px; }
        .inv-eff { font-size: 12px; color: #94a3b8; }
        .inv-eff.disabled { color: #64748b; text-decoration: line-through; }
        .inv-eff.demerit { color: #ef4444; }
        .btn-sell { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: bold; z-index: 5; }
        .btn-close { margin-top: 15px; background: #ef4444; color: white; width: 85%; padding: 14px; border-radius: 8px; font-weight: bold; display: block; margin-left: auto; margin-right: auto; }
        
        .stat-group { background: #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #38bdf8; text-align: left; width: 100%; box-sizing: border-box; }
        .stat-title { font-size: 14px; font-weight: bold; color: #f8fafc; margin-bottom: 4px; border-bottom: 1px solid #334155; padding-bottom: 4px;}
        .stat-detail { font-size: 12px; color: #cbd5e1; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .stat-val { color: #f59e0b; font-weight: bold; }
    </style>
</head>

    <button id="btn-auto-stop" class="hidden">■ 自動操作を終了</button>
    
    <div id="title-layer" class="ui-layer">

        </div>

        <div class="menu-content">
            <h2>装備合成</h2>

            <div id="synth-list" class="list-box"></div>
            <button id="btn-synth-exec" class="equip-btn" style="background: #8b5cf6; margin-top: 15px;">合成実行</button>
            <button id="btn-synth-close" class="btn-close">戻る</button>
        </div>

<script>
// ==========================================
// 1. サウンド & 定義
// ==========================================
let audioCtx = null;
const Sound = {
    play: function(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.1); gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(now); osc.stop(now+0.1); }
            else if (type === 'explosion') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now+0.2); gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.2); osc.start(now); osc.stop(now+0.2); }
            else if (type === 'powerup') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(1200, now+0.2); gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0.01, now+0.2); osc.start(now); osc.stop(now+0.2); }
            else if (type === 'laser') { osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now+0.1); gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(now); osc.stop(now+0.1); }
        } catch(e) {}
    }
};

const ITEM_DEFS = {
    'none': {cat: 'none', name: '【空き】', short: 'なし'},
    'main_normal': {cat: 'main', name: 'ﾉｰﾏﾙﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ威力'},
    'main_rapid': {cat: 'main', name: 'ﾗﾋﾟｯﾄﾞﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ速度'},
    'main_pierce': {cat: 'main', name: '貫通ﾎﾞｰﾙ[RARE]', short: 'ﾎﾞｰﾙ貫通'},
    'main_exp_rad': {cat: 'main', name: '爆発ﾎﾞｰﾙ(広域)', short: 'ﾎﾞｰﾙ爆発範囲'},
    'main_exp_dmg': {cat: 'main', name: '爆発ﾎﾞｰﾙ(威力)', short: 'ﾎﾞｰﾙ爆発威力'},
    'sub_lsr_dmg': {cat: 'sub', name: 'ﾚｰｻﾞｰ(威力)', short: 'ﾚｰｻﾞｰ威力'},
    'sub_lsr_spd': {cat: 'sub', name: 'ﾚｰｻﾞｰ(速射)', short: 'ﾚｰｻﾞｰ速射'},
    'sub_lsr_prc': {cat: 'sub', name: 'ﾚｰｻﾞｰ(貫通)[RARE]', short: 'ﾚｰｻﾞｰ貫通'},
    'sub_lsr_thk': {cat: 'sub', name: 'ﾚｰｻﾞｰ(太さ)[RARE]', short: 'ﾚｰｻﾞｰ太さ'},
    'sub_msl_dmg': {cat: 'sub', name: 'ﾐｻｲﾙ(威力)', short: 'ﾐｻｲﾙ威力'},
    'sub_msl_spd': {cat: 'sub', name: 'ﾐｻｲﾙ(速度)', short: 'ﾐｻｲﾙ速度'},
    'sub_msl_rad': {cat: 'sub', name: 'ﾐｻｲﾙ(範囲)', short: 'ﾐｻｲﾙ範囲'},
    'sub_msl_cnt': {cat: 'sub', name: 'ﾐｻｲﾙ(弾数)', short: 'ﾐｻｲﾙ弾数'},
    'sub_bomb_req': {cat: 'sub', name: 'ﾎﾞﾑ(ｺｽﾄ減)', short: 'ﾎﾞﾑｺｽﾄ削減'},
    'opt_rot_cnt': {cat: 'opt', name: '回転ﾊﾞﾘｱ(枚数)', short: '回転ﾊﾞﾘｱ枚数'},
    'opt_rot_size': {cat: 'opt', name: '回転ﾊﾞﾘｱ(ｻｲｽﾞ)', short: '回転ﾊﾞﾘｱｻｲｽﾞ'},
    'opt_rot_spd': {cat: 'opt', name: '回転ﾊﾞﾘｱ(速度)', short: '回転ﾊﾞﾘｱ速度'},
    'opt_pill_size': {cat: 'opt', name: 'ﾄｰﾁｶ(ｻｲｽﾞ)', short: 'ﾄｰﾁｶｻｲｽﾞ'},
    'opt_pill_cnt': {cat: 'opt', name: 'ﾄｰﾁｶ(設置数)', short: 'ﾄｰﾁｶ数'},
    'opt_pill_hp': {cat: 'opt', name: 'ﾄｰﾁｶ(強度)', short: 'ﾄｰﾁｶ強度'},
    'acc_ball_cnt': {cat: 'acc', name: '初期弾数追加[RARE]', short: '初期弾数'},
    'acc_sat_hp': {cat: 'acc', name: '子機(体力)', short: '子機体力'},
    'acc_sat_spd': {cat: 'acc', name: '子機(移動速度)', short: '子機速度'},
    'acc_sat_cnt': {cat: 'acc', name: '子機(追加)', short: '子機数'},
    'acc_score_up': {cat: 'acc', name: '獲得ﾎﾟｲﾝﾄUP', short: 'ﾎﾟｲﾝﾄ獲得量'},
    'acc_life_up': {cat: 'acc', name: '最大ﾗｲﾌUP', short: '最大ﾗｲﾌ'}
};

const GACHA_POOL = Object.keys(ITEM_DEFS).filter(k => k !== 'none');

const APPLY_EFFECTS = {
    'main_normal': (l, s) => { s.mainDmg += l; },
    'main_rapid': (l, s) => { s.mainSpeed += l * 0.5; },
    'main_pierce': (l, s) => { s.mainPierce += l; },
    'main_exp_rad': (l, s) => { s.hasExp = true; s.mainExplodeRad += l * 10; },
    'main_exp_dmg': (l, s) => { s.hasExp = true; s.mainExplodeDmg += l; },
    'sub_lsr_dmg': (l, s) => { s.lsrDmg += l; },
    'sub_lsr_spd': (l, s) => { s.lsrInterval = Math.max(4, 40 - l * 2); },
    'sub_lsr_prc': (l, s) => { s.lsrPierce += l; },
    'sub_lsr_thk': (l, s) => { s.lsrWidth += l * 3; },
    'sub_msl_dmg': (l, s) => { s.hasMsl = true; s.mslDmg += l * 2; },
    'sub_msl_spd': (l, s) => { s.hasMsl = true; s.mslSpd += l * 0.2; },
    'sub_msl_rad': (l, s) => { s.hasMsl = true; s.mslRad += l * 15; },
    'sub_msl_cnt': (l, s) => { s.hasMsl = true; s.mslCnt += l; },
    'sub_bomb_req': (l, s) => { s.bombReq -= l; },
    'opt_rot_cnt': (l, s) => { s.rotCnt += l; },
    'opt_rot_size': (l, s) => { s.rotSize += l * 2; },
    'opt_rot_spd': (l, s) => { s.rotSpd += l * 0.01; },
    'opt_pill_size': (l, s) => { s.pillSize += l * 4; },
    'opt_pill_cnt': (l, s) => { s.pillCnt += l; },
    'opt_pill_hp': (l, s) => { s.pillHp += l * 2; },
    'acc_ball_cnt': (l, s) => { s.accBalls += l; },
    'acc_sat_hp': (l, s) => { s.satHp += l * 2; },
    'acc_sat_spd': (l, s) => { s.satSpd += l * 1.5; },
    'acc_sat_cnt': (l, s) => { s.satCnt += l; },
    'acc_score_up': (l, s) => { s.scoreMult += l * 0.5; },
    'acc_life_up': (l, s) => { s.maxLife += l; }
};

// ==========================================
// 2. セーブデータ管理
// ==========================================
class SaveData {
    constructor() { this.load(); }
    load() {
        let data = {}; 
        try { const str = localStorage.getItem('megabreakout_save_v18'); if (str) data = JSON.parse(str); } catch(e) {}
        this.loadout = data.loadout || {main: 'main_normal', sub: 'none', option: 'none', acc1: 'none', acc2: 'none'};
        this.total_points = data.total_points || 0;
        this.item_counts = data.item_counts || {'main_normal': 1};
        this.custom_items = data.custom_items || {};
        this.synth_items = data.synth_items || {};
        this.max_manual_layer = data.max_manual_layer || 0;
    }
    save() { 
        try { localStorage.setItem('megabreakout_save_v18', JSON.stringify({
            loadout: this.loadout, total_points: this.total_points, item_counts: this.item_counts, 
            custom_items: this.custom_items, synth_items: this.synth_items, max_manual_layer: this.max_manual_layer
        })); } catch(e) {} 
    }
    getLevel(itemId) {
        if (!itemId || itemId === 'none') return 0;
        const c = this.item_counts[itemId] || 0; if (c <= 0) return 0;
        return Math.min(20, Math.floor(Math.log2(c)) + 1);
    }
}
const save = new SaveData();

function calcCurrentStats() {
    let s = {
        mainDmg: 1, mainPierce: 0, hasExp: false, mainExplodeRad: 40, mainExplodeDmg: 1, mainSpeed: 4,
        lsrInterval: 40, lsrPierce: 0, lsrWidth: 4, lsrDmg: 1,
        hasMsl: false, mslCnt: 1, mslSpd: 1.0, mslRad: 50, mslDmg: 1,
        satCnt: 0, satHp: 1, satSpd: 2, accBalls: 0,
        bombReq: 20, rotCnt: 0, rotSize: 8, rotSpd: 0.05, pillCnt: 0, pillSize: 30, pillHp: 1,
        scoreMult: 1, maxLife: 3
    };
    ['main', 'sub', 'option', 'acc1', 'acc2'].forEach(slot => {
        const itemId = save.loadout[slot];
        if (itemId === 'none') return;
        let slotCat = slot.replace(/\d/, ''); if (slotCat === 'option') slotCat = 'opt';
        if (save.custom_items[itemId] || save.synth_items[itemId]) {
            const itemData = save.custom_items[itemId] || save.synth_items[itemId];
            const itemLvl = itemData.level || 1;
            itemData.effects.forEach(ef => {
                const def = ITEM_DEFS[ef.type];
                if (!def) return;
                const actualLevel = ef.level * itemLvl;
                if (slotCat === 'opt' || slotCat === 'acc' || def.cat === slotCat || itemData.cat === 'mix') {
                    APPLY_EFFECTS[ef.type](actualLevel, s);
                }
            });
        } else {
            const lvl = save.getLevel(itemId);
            if (APPLY_EFFECTS[itemId]) APPLY_EFFECTS[itemId](lvl, s);
        }
    });
    return s;
}

// ==========================================
// 3. UI 制御関数 (ここがエラー解消の鍵)
// ==========================================
window.startTitleScreen = function() {
    Sound.play('powerup');
    window.showEquipMenu("");
};

window.showEquipMenu = function(msg) {
    document.getElementById('title-layer').classList.add('hidden');
    document.getElementById('inventory-modal').classList.add('hidden');
    document.getElementById('stats-modal').classList.add('hidden');
    document.getElementById('synth-modal').classList.add('hidden');
    document.getElementById('equip-layer').classList.remove('hidden');
    
    if (msg) document.getElementById('equip-title').innerText = msg;
    document.getElementById('pt-label').innerText = `所持ポイント: ${save.total_points} pt`;
    document.getElementById('auto-max-label').innerText = `手動最高到達: ${save.max_manual_layer}層`;

    const b = save.loadout;
    const getDisp = (id) => ITEM_DEFS[id]?.short || save.synth_items[id]?.name || save.custom_items[id]?.name || "なし";
    document.getElementById('btn-main').innerText = "メイン: " + getDisp(b.main);
    document.getElementById('btn-sub').innerText = "サブ: " + getDisp(b.sub);
    document.getElementById('btn-option').innerText = "支援機: " + getDisp(b.option);
    document.getElementById('btn-acc1').innerText = "アクセ1: " + getDisp(b.acc1);
    document.getElementById('btn-acc2').innerText = "アクセ2: " + getDisp(b.acc2);
};

window.startGame = function(auto) {
    document.getElementById('equip-layer').classList.add('hidden');
    window.game.autoMode = auto;
    if (auto) document.getElementById('btn-auto-stop').classList.remove('hidden');
    window.game.initGame();
};

window.closeModal = function(id) {
    document.getElementById(id).classList.add('hidden');
    document.getElementById('equip-layer').classList.remove('hidden');
};

window.stopAutoMode = function() {
    window.game.autoMode = false;
    document.getElementById('btn-auto-stop').classList.add('hidden');
};

// ==========================================
// 4. ゲームエンジン (描画とロジック)
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = document.getElementById('game-wrapper').clientWidth; canvas.height = document.getElementById('game-wrapper').clientHeight; }
window.addEventListener('resize', resize); resize();
function intersect(a, b) { return Math.abs(a.x - b.x) < (a.w + b.w) / 2 && Math.abs(a.y - b.y) < (a.h + b.h) / 2; }

class Game {
    constructor() {
        this.state = 'TITLE'; this.ctrlY = canvas.height - 150;
        this.paddle = { w: 80, h: 15, x: canvas.width / 2, y: canvas.height - 170 };
        this.autoMode = false;
        this.resetGameVars(); this.bindEvents(); this.loop = this.loop.bind(this); requestAnimationFrame(this.loop);
    }
    resetGameVars() {
        this.stage = 1; this.totalLayers = 0; this.blocksDestroyed = 0; this.columns = 6;
        this.balls = []; this.items = []; this.lasers = []; this.missiles = []; this.enemyBullets = [];
        this.blocks = []; this.fallingBlocks = []; this.effects = []; this.floatingTexts = [];
        this.satellites = []; this.barrierNodes = []; this.staticBarriers = [];
        this.boss = null; this.gameOver = false; this.pendingRestart = false; this.subTimer = 0;
    }
    initGame() {
        this.resetGameVars(); this.s = calcCurrentStats(); this.lives = this.s.maxLife;
        this.topMargin = 90; this.ROW_H = (this.ctrlY - this.topMargin) / 20;
        this.spawnInitialBlocks();
        this.spawnBall(canvas.width / 2, this.paddle.y - 30);
        this.state = 'PLAYING';
    }
    spawnInitialBlocks() { for (let i = 0; i < 5; i++) this.spawnRow(this.topMargin + (i * this.ROW_H)); }
    spawnRow(y) {
        const bw = canvas.width / this.columns;
        for (let i = 0; i < this.columns; i++) {
            this.blocks.push({ x: i * bw + bw / 2, y, w: bw - 4, h: this.ROW_H - 4, color: '#10b981', hp: 1, bType: 'normal' });
        }
    }
    spawnBall(x, y) {
        this.balls.push({ x, y, w: 14, h: 14, vx: 4, vy: -4, color: '#fff', damage: this.s.mainDmg, activePierce: 0 });
    }
    update() {
        if (this.state !== 'PLAYING' && this.state !== 'BOSS') return;
        this.subTimer++;
        this.moveBalls();
        this.handleCollisions();
        this.checkRules();
    }
    moveBalls() {
        this.balls.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            if (b.x < 0 || b.x > canvas.width) b.vx *= -1;
            if (b.y < 0) b.vy *= -1;
        });
        this.balls = this.balls.filter(b => b.y < canvas.height);
    }
    handleCollisions() {
        this.balls.forEach(b => {
            if (intersect(b, this.paddle) && b.vy > 0) { b.vy *= -1; Sound.play('hit'); }
            for (let i = this.blocks.length - 1; i >= 0; i--) {
                if (intersect(b, this.blocks[i])) {
                    Sound.play('hit'); this.blocks.splice(i, 1); b.vy *= -1;
                    save.total_points += 10;
                }
            }
        });
    }
    checkRules() {
        if (this.balls.length === 0) {
            this.lives--;
            if (this.lives <= 0) {
                this.state = 'TITLE'; save.save(); window.showEquipMenu("GAME OVER");
            } else { this.spawnBall(canvas.width/2, this.paddle.y-30); }
        }
    }
    draw() {
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (this.state === 'TITLE') return;
        ctx.fillStyle = '#38bdf8'; ctx.fillRect(this.paddle.x - this.paddle.w/2, this.paddle.y - this.paddle.h/2, this.paddle.w, this.paddle.h);
        this.balls.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill(); });
        this.blocks.forEach(bl => { ctx.fillStyle = bl.color; ctx.fillRect(bl.x - bl.w/2, bl.y - bl.h/2, bl.w, bl.h); });
    }
    loop() { this.update(); this.draw(); requestAnimationFrame(this.loop); }
    bindEvents() {
        const move = (cx) => {
            const rect = canvas.getBoundingClientRect();
            this.paddle.x = (cx - rect.left) * (canvas.width / rect.width);
        };
        canvas.addEventListener('touchmove', e => move(e.touches[0].clientX));
        canvas.addEventListener('mousemove', e => move(e.clientX));
    }
}
window.game = new Game();

// ==========================================
// 5. 初期化 & イベント登録
// ==========================================
window.onload = function() {
    function bind(id, fn) {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('click', fn);
            el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, {passive: false});
        }
    }

    bind('title-layer', window.startTitleScreen);
    bind('btn-main', () => openInventory('main'));
    bind('btn-sub', () => openInventory('sub'));
    bind('btn-option', () => openInventory('option'));
    bind('btn-acc1', () => openInventory('acc1'));
    bind('btn-acc2', () => openInventory('acc2'));
    bind('btn-start', () => window.startGame(false));
    bind('btn-auto-start', () => window.startGame(true));
    bind('btn-auto-stop', window.stopAutoMode);
    bind('btn-inv-close', () => window.closeModal('inventory-modal'));
    bind('btn-stats-show', () => {
        const s = calcCurrentStats();
        document.getElementById('stats-list').innerHTML = `<div class="stat-group"><div class="stat-title">基本ステータス</div><div class="stat-detail">ライフ: ${s.maxLife}</div></div>`;
        document.getElementById('equip-layer').classList.add('hidden');
        document.getElementById('stats-modal').classList.remove('hidden');
    });
    bind('btn-stats-close', () => window.closeModal('stats-modal'));

    // ガチャ・合成のスタブ
    bind('btn-gacha-1', () => { if(save.total_points >= 300) { save.total_points -= 300; save.save(); window.showEquipMenu("ガチャを引きました"); } });
};

function openInventory(slot) {
    const list = document.getElementById('inv-list');
    list.innerHTML = "";
    Object.keys(ITEM_DEFS).forEach(id => {
        if (ITEM_DEFS[id].cat === slot.replace(/\d/, '') || id === 'none') {
            const div = document.createElement('div');
            div.className = 'inv-item';
            div.innerText = ITEM_DEFS[id].name;
            div.onclick = () => { save.loadout[slot] = id; save.save(); window.showEquipMenu(); };
            list.appendChild(div);
        }
    });
    document.getElementById('equip-layer').classList.add('hidden');
    document.getElementById('inventory-modal').classList.remove('hidden');
}
