<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEGA BREAKOUT V16 (Remastered)</title>
    <style>
        /* === 共通設定 === */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        #game-wrapper { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 850px; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        
        /* === UIレイヤー === */
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.95); z-index: 10; color: #f8fafc; 
        }
        .hidden { display: none !important; }
        .modal { z-index: 30; background: rgba(15, 23, 42, 0.98); }
        .menu-content { width: 100%; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 0; box-sizing: border-box; }

        /* === テキスト装飾 === */
        h1 { font-size: 32px; margin-bottom: 5px; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); text-align: center; font-weight: 800; letter-spacing: 1px; pointer-events: none; }
        .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 30px; font-weight: 600; letter-spacing: 2px; pointer-events: none;}
        .blink { font-size: 15px; animation: blinker 1.5s linear infinite; padding: 20px; color: #cbd5e1; font-weight: bold; pointer-events: none;}
        @keyframes blinker { 50% { opacity: 0.3; } }
        
        h2 { font-size: 20px; margin: 10px 0; color: #f8fafc; }
        .stats-text { color: #38bdf8; font-size: 15px; margin: 5px 0; font-weight: bold; }
        .sub-text { font-size: 12px; color: #94a3b8; margin-bottom: 15px; }
        
        /* === ボタン群 === */
        button { font-family: inherit; outline: none; border: none; cursor: pointer; flex-shrink: 0; transition: transform 0.1s, background-color 0.2s; touch-action: manipulation; }
        button:active { transform: scale(0.97); }
        
        .equip-btn { background: #334155; color: #f8fafc; width: 85%; padding: 14px; margin: 5px 0; font-size: 14px; border-radius: 8px; font-weight: 600; }
        .gacha-box { display: flex; gap: 4%; width: 85%; margin-top: 15px; }
        .btn-gacha { flex: 1; background: #f59e0b; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        .btn-synth { flex: 1; background: #8b5cf6; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        
        .btn-start { background: #10b981; color: white; margin-top: 25px; font-size: 16px; padding: 15px; font-weight: bold; border-radius: 8px; width: 85%; }
        .btn-auto-start { background: transparent; color: #f59e0b; margin-top: 10px; margin-bottom: 20px; font-size: 14px; padding: 12px; font-weight: bold; border: 2px solid #f59e0b; border-radius: 8px; width: 85%; }
        .btn-close { margin-top: 15px; background: #ef4444; color: white; width: 85%; padding: 14px; border-radius: 8px; font-weight: bold; }
        
        #btn-auto-stop { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 24px; font-size: 14px; border-radius: 30px; font-weight: bold; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* === リスト・アイテム === */
        .list-box { width: 90%; max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; margin-top: 10px; }
        .inv-item { background: #1e293b; border: 2px solid #334155; padding: 14px; border-radius: 8px; color: white; text-align: left; position: relative; }
        .inv-item.selected { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .inv-name { font-weight: bold; color: #f8fafc; margin-bottom: 6px; display: inline-block; width: 70%; font-size: 14px; pointer-events: none;}
        .inv-eff { font-size: 12px; color: #94a3b8; pointer-events: none;}
        .inv-eff.disabled { color: #64748b; text-decoration: line-through; }
        .inv-eff.demerit { color: #ef4444; }
        .btn-sell { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: bold; z-index: 5; }
        
        /* === ステータス表示 === */
        .stat-group { background: #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #38bdf8; text-align: left; width: 100%; box-sizing: border-box;}
        .stat-title { font-size: 14px; font-weight: bold; color: #f8fafc; margin-bottom: 4px; border-bottom: 1px solid #334155; padding-bottom: 4px;}
        .stat-detail { font-size: 12px; color: #cbd5e1; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .stat-val { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <button id="btn-auto-stop" class="hidden" onclick="UI.stopAutoMode()">■ 自動操作を終了</button>
    
    <div id="title-layer" class="ui-layer" onclick="UI.showEquipMenu()">
        <div class="menu-content" style="pointer-events: none;">
            <h1>MEGA BREAKOUT</h1>
            <div class="subtitle">REMASTERED V16</div>
            <div class="blink">画面をタップしてスタート</div>
        </div>
    </div>
    
    <div id="equip-layer" class="ui-layer hidden">
        <div class="menu-content">
            <h2 id="equip-title">装備変更 & 再挑戦</h2>
            <div id="pt-label" class="stats-text">所持ポイント: 0 pt</div>
            <div id="auto-max-label" class="sub-text">手動最高到達: 0層</div>
            
            <button id="btn-main" class="equip-btn" onclick="UI.openInventory('main')"></button>
            <button id="btn-sub" class="equip-btn" onclick="UI.openInventory('sub')"></button>
            <button id="btn-option" class="equip-btn" onclick="UI.openInventory('option')"></button>
            <button id="btn-acc1" class="equip-btn" onclick="UI.openInventory('acc1')"></button>
            <button id="btn-acc2" class="equip-btn" onclick="UI.openInventory('acc2')"></button>
            
            <button class="equip-btn" style="background: #0ea5e9; margin-top: 15px;" onclick="UI.showStatsModal()">📊 現在のステータス詳細</button>
            
            <div class="gacha-box">
                <button class="btn-gacha" onclick="UI.pullGacha(false)">ガチャ</button>
                <button class="btn-gacha" onclick="UI.pullGacha(true)">一括</button>
                <button class="btn-synth" onclick="UI.openSynth()">合成</button>
            </div>
            
            <button class="btn-start" onclick="UI.startGame(false)">▶︎ 通常スタート</button>
            <button class="btn-auto-start" onclick="UI.startGame(true)">🤖 自動モード (上限階層でループ)</button>
        </div>
    </div>

    <div id="stats-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2>📊 ステータス詳細</h2>
            <div id="stats-list" class="list-box" style="padding: 5px;"></div>
            <button class="btn-close" onclick="UI.closeModal('stats-modal')">戻る</button>
        </div>
    </div>

    <div id="inventory-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2 id="inv-title">装備を選択</h2>
            <div id="inv-list" class="list-box"></div>
            <button class="btn-close" onclick="UI.closeModal('inventory-modal')">戻る</button>
        </div>
    </div>

    <div id="synth-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2>装備合成</h2>
            <p class="sub-text">LvMAXのガチャ装備を2つ選択してください</p>
            <div id="synth-list" class="list-box"></div>
            <button id="btn-synth-exec" class="equip-btn" style="background: #8b5cf6; margin-top: 15px;" onclick="UI.execSynth()">合成実行 (2つ選択)</button>
            <button class="btn-close" onclick="UI.closeModal('synth-modal')">戻る</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. サウンド管理 (簡略化・安定化)
// ==========================================
let audioCtx = null;
const Sound = {
    play: function(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'hit') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.1);
                osc.start(now); osc.stop(now+0.1);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now+0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.2);
                osc.start(now); osc.stop(now+0.2);
            } else if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.linearRampToValueAtTime(2000, now+0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0.01, now+0.1);
                osc.start(now); osc.stop(now+0.1);
            }
        } catch(e) { console.warn("Audio disabled"); }
    }
};

// ==========================================
// 2. アイテム定義とステータス計算基盤
// ==========================================
const ITEM_DEFS = {
    'none': {cat: 'none', name: '【空き】', short: 'なし'},
    'main_normal': {cat: 'main', name: 'ﾉｰﾏﾙﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ威力'},
    'main_rapid': {cat: 'main', name: 'ﾗﾋﾟｯﾄﾞﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ速度'},
    'main_pierce': {cat: 'main', name: '貫通ﾎﾞｰﾙ[RARE]', short: 'ﾎﾞｰﾙ貫通'},
    'main_exp_rad': {cat: 'main', name: '爆発ﾎﾞｰﾙ(広域)', short: 'ﾎﾞｰﾙ爆発範囲'},
    'main_exp_dmg': {cat: 'main', name: '爆発ﾎﾞｰﾙ(威力)', short: 'ﾎﾞｰﾙ爆発威力'},
    
    'sub_lsr_dmg': {cat: 'sub', name: 'ﾚｰｻﾞｰ(威力)', short: 'ﾚｰｻﾞｰ威力'},
    'sub_lsr_spd': {cat: 'sub', name: 'ﾚｰｻﾞｰ(速射)', short: 'ﾚｰｻﾞｰ速射'},
    'sub_lsr_prc': {cat: 'sub', name: 'ﾚｰｻﾞｰ(貫通)[RARE]', short: 'ﾚｰｻﾞｰ貫通'},
    'sub_lsr_thk': {cat: 'sub', name: 'ﾚｰｻﾞｰ(太さ)[RARE]', short: 'ﾚｰｻﾞｰ太さ'},
    'sub_msl_dmg': {cat: 'sub', name: 'ﾐｻｲﾙ(威力)', short: 'ﾐｻｲﾙ威力'},
    'sub_msl_spd': {cat: 'sub', name: 'ﾐｻｲﾙ(速度)', short: 'ﾐｻｲﾙ速度'},
    'sub_msl_rad': {cat: 'sub', name: 'ﾐｻｲﾙ(範囲)', short: 'ﾐｻｲﾙ範囲'},
    'sub_msl_cnt': {cat: 'sub', name: 'ﾐｻｲﾙ(弾数)', short: 'ﾐｻｲﾙ弾数'},
    'sub_bomb_req': {cat: 'sub', name: 'ﾎﾞﾑ(ｺｽﾄ減)', short: 'ﾎﾞﾑｺｽﾄ削減'},
    
    'opt_rot_cnt': {cat: 'opt', name: '回転ﾊﾞﾘｱ(枚数)', short: '回転ﾊﾞﾘｱ枚数'},
    'opt_rot_size': {cat: 'opt', name: '回転ﾊﾞﾘｱ(ｻｲｽﾞ)', short: '回転ﾊﾞﾘｱｻｲｽﾞ'},
    'opt_rot_spd': {cat: 'opt', name: '回転ﾊﾞﾘｱ(速度)', short: '回転ﾊﾞﾘｱ速度'},
    'opt_pill_size': {cat: 'opt', name: 'ﾄｰﾁｶ(ｻｲｽﾞ)', short: 'ﾄｰﾁｶｻｲｽﾞ'},
    'opt_pill_cnt': {cat: 'opt', name: 'ﾄｰﾁｶ(設置数)', short: 'ﾄｰﾁｶ数'},
    'opt_pill_hp': {cat: 'opt', name: 'ﾄｰﾁｶ(強度)', short: 'ﾄｰﾁｶ強度'},
    
    'acc_ball_cnt': {cat: 'acc', name: '初期弾数追加[RARE]', short: '初期弾数'},
    'acc_sat_hp': {cat: 'acc', name: '子機(体力)', short: '子機体力'},
    'acc_sat_spd': {cat: 'acc', name: '子機(移動速度)', short: '子機速度'},
    'acc_sat_cnt': {cat: 'acc', name: '子機(追加)', short: '子機数'},
    'acc_score_up': {cat: 'acc', name: '獲得ﾎﾟｲﾝﾄUP', short: 'ﾎﾟｲﾝﾄ獲得量'},
    'acc_life_up': {cat: 'acc', name: '最大ﾗｲﾌUP', short: '最大ﾗｲﾌ'}
};

const GACHA_POOL = Object.keys(ITEM_DEFS).filter(k => k !== 'none');

// ★ ステータス適用関数群 (スパゲティ解消のためスッキリ整理)
const APPLY_EFFECTS = {
    'main_normal': (l, s) => { s.mainDmg += l; },
    'main_rapid': (l, s) => { s.mainSpd += l * 0.5; },
    'main_pierce': (l, s) => { s.mainPierce += l; },
    'main_exp_rad': (l, s) => { s.hasExp = true; s.mainExpRad += l * 10; },
    'main_exp_dmg': (l, s) => { s.hasExp = true; s.mainExpDmg += l; },

    'sub_lsr_dmg': (l, s) => { s.lsrDmg += l; },
    'sub_lsr_spd': (l, s) => { s.lsrInterval = Math.max(4, 40 - l * 2); },
    'sub_lsr_prc': (l, s) => { s.lsrPierce += l; },
    'sub_lsr_thk': (l, s) => { s.lsrWidth += l * 3; },

    'sub_msl_dmg': (l, s) => { s.hasMsl = true; s.mslDmg += l * 2; },
    'sub_msl_spd': (l, s) => { s.hasMsl = true; s.mslSpd += l * 0.2; },
    'sub_msl_rad': (l, s) => { s.hasMsl = true; s.mslRad += l * 15; },
    'sub_msl_cnt': (l, s) => { s.hasMsl = true; s.mslCnt += l; },
    'sub_bomb_req': (l, s) => { s.bombReq -= l; },

    'opt_rot_cnt': (l, s) => { s.rotCnt += l; },
    'opt_rot_size': (l, s) => { s.rotSize += l * 2; },
    'opt_rot_spd': (l, s) => { s.rotSpd += l * 0.01; },
    'opt_pill_size': (l, s) => { s.pillSize += l * 4; },
    'opt_pill_cnt': (l, s) => { s.pillCnt += l; },
    'opt_pill_hp': (l, s) => { s.pillHp += l * 2; },

    'acc_ball_cnt': (l, s) => { s.accBalls += l; },
    'acc_sat_hp': (l, s) => { s.hasSat = true; s.satHp += l * 2; },
    'acc_sat_spd': (l, s) => { s.hasSat = true; s.satSpd += l * 1.5; },
    'acc_sat_cnt': (l, s) => { s.hasSat = true; s.satCnt += l; },
    'acc_score_up': (l, s) => { s.scoreMult += l * 0.5; },
    'acc_life_up': (l, s) => { s.maxLife += l; }
};

// ==========================================
// 3. セーブデータ管理
// ==========================================
class SaveData {
    constructor() { this.load(); }
    load() {
        let data = {}; 
        try { 
            const str = localStorage.getItem('megabreakout_save_v16');
            if (str) data = JSON.parse(str); 
        } catch(e) {}
        
        this.loadout = data.loadout || {main: 'main_normal', sub: 'none', option: 'none', acc1: 'none', acc2: 'none'};
        this.total_points = data.total_points || 0;
        this.item_counts = data.item_counts || {'main_normal': 1};
        this.custom_items = data.custom_items || {};
        this.synth_items = data.synth_items || {};
        this.max_manual_layer = data.max_manual_layer || 0;
        
        // データ破損防止
        ['main', 'sub', 'option', 'acc1', 'acc2'].forEach(slot => {
            const id = this.loadout[slot];
            if (id !== 'none' && !ITEM_DEFS[id] && !this.custom_items[id] && !this.synth_items[id]) {
                this.loadout[slot] = (slot === 'main') ? 'main_normal' : 'none';
            }
        });
    }
    save() { 
        try { 
            localStorage.setItem('megabreakout_save_v16', JSON.stringify({
                loadout: this.loadout, total_points: this.total_points, item_counts: this.item_counts, 
                custom_items: this.custom_items, synth_items: this.synth_items, max_manual_layer: this.max_manual_layer
            })); 
        } catch(e) {} 
    }
    getLevel(itemId) {
        if (!itemId || itemId === 'none') return 0;
        const c = this.item_counts[itemId] || 0; if (c <= 0) return 0;
        return Math.min(20, Math.floor(Math.log2(c)) + 1);
    }
}
const save = new SaveData();

// ★ ステータスの一括計算（ゲームとUIで共有）
function calcStats() {
    let s = {
        mainDmg: 1, mainPierce: 0, hasExp: false, mainExpRad: 40, mainExpDmg: 1, mainSpd: 4,
        lsrInterval: 40, lsrPierce: 0, lsrWidth: 4, lsrDmg: 1,
        hasMsl: false, mslCnt: 1, mslSpd: 1.0, mslRad: 50, mslDmg: 1,
        hasSat: false, satCnt: 0, satHp: 1, satSpd: 2, 
        accBalls: 0, bombReq: 20, rotCnt: 0, rotSize: 8, rotSpd: 0.05, pillCnt: 0, pillSize: 30, pillHp: 1,
        scoreMult: 1, maxLife: 3
    };
    
    ['main', 'sub', 'option', 'acc1', 'acc2'].forEach(slot => {
        const itemId = save.loadout[slot];
        if (itemId === 'none') return;
        
        let slotCat = slot.replace(/\d/, ''); 
        if (slotCat === 'option') slotCat = 'opt';

        if (save.custom_items[itemId] || save.synth_items[itemId]) {
            const itemData = save.custom_items[itemId] || save.synth_items[itemId];
            const itemLvl = itemData.level || 1;
            
            itemData.effects.forEach(ef => {
                const def = ITEM_DEFS[ef.type];
                if (!def) return;
                const actualLevel = ef.level * itemLvl;
                
                // メリット効果の発動判定 (オプション枠は全てのメリットが発動)
                if (actualLevel > 0) {
                    if (slotCat === 'opt' || def.cat === slotCat || itemData.cat === 'mix') {
                        if(APPLY_EFFECTS[ef.type]) APPLY_EFFECTS[ef.type](actualLevel, s);
                    }
                } else {
                    // デメリットは常に発動
                    if(APPLY_EFFECTS[ef.type]) APPLY_EFFECTS[ef.type](actualLevel, s);
                }
            });
        } else {
            const lvl = save.getLevel(itemId);
            if (APPLY_EFFECTS[itemId]) APPLY_EFFECTS[itemId](lvl, s);
        }
    });

    // 異常値のクリッピング
    s.maxLife = Math.max(1, s.maxLife);
    s.mslSpd = Math.max(0.1
