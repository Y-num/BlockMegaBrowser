<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MEGA BREAKOUT V22</title>
    <style>
        /* 見やすくクリーンなモダンデザイン */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; -webkit-user-select: none; }
        #game-wrapper { position: relative; width: 100%; max-width: 450px; height: 100%; max-height: 850px; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        
        .ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.95); z-index: 10; color: #f8fafc; 
        }
        .hidden { display: none !important; }
        .modal { z-index: 30; background: rgba(15, 23, 42, 0.98); }

        .menu-content { width: 100%; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; align-items: center; padding: 20px 0; box-sizing: border-box; }

        #title-layer { cursor: pointer; }
        h1 { font-size: 32px; margin-bottom: 5px; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); text-align: center; font-weight: 800; letter-spacing: 1px; }
        .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 30px; font-weight: 600; letter-spacing: 2px; }
        .blink { font-size: 15px; animation: blinker 1.5s linear infinite; padding: 20px; color: #cbd5e1; font-weight: bold; pointer-events: none; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        
        h2 { font-size: 20px; margin: 10px 0; color: #f8fafc; }
        .stats-text { color: #38bdf8; font-size: 15px; margin: 5px 0; font-weight: bold; }
        .sub-text { font-size: 12px; color: #94a3b8; margin-bottom: 15px; text-align: center; }
        
        button { font-family: inherit; outline: none; border: none; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; touch-action: manipulation; }
        button:active { transform: scale(0.96); }
        
        .equip-btn { background: #334155; color: #f8fafc; width: 85%; padding: 14px; margin: 5px 0; font-size: 14px; border-radius: 8px; font-weight: 600; }
        
        .gacha-box { display: flex; gap: 4%; width: 85%; margin-top: 15px; }
        .btn-gacha { flex: 1; background: #f59e0b; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        .btn-synth { flex: 1; background: #8b5cf6; color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 8px; }
        
        .btn-start { background: #10b981; color: white; margin-top: 25px; font-size: 16px; padding: 15px; font-weight: bold; border-radius: 8px; width: 85%; }
        .btn-auto-start { background: transparent; color: #f59e0b; margin-top: 10px; margin-bottom: 20px; font-size: 14px; padding: 12px; font-weight: bold; border: 2px solid #f59e0b; border-radius: 8px; width: 85%; }
        
        #btn-auto-stop { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 24px; font-size: 14px; border-radius: 30px; font-weight: bold; z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .list-box { width: 90%; max-height: 50vh; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; margin-top: 10px; }
        .inv-item { background: #1e293b; border: 2px solid #334155; padding: 14px; border-radius: 8px; color: white; text-align: left; position: relative; width: 100%; box-sizing: border-box; }
        .inv-item.selected { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .inv-name { font-weight: bold; color: #f8fafc; margin-bottom: 6px; display: inline-block; width: 70%; font-size: 14px; pointer-events: none; }
        .inv-eff { font-size: 12px; color: #94a3b8; pointer-events: none; }
        .inv-eff.disabled { color: #64748b; text-decoration: line-through; }
        .inv-eff.demerit { color: #ef4444; }
        .btn-sell { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: bold; z-index: 5; }
        .btn-close { margin-top: 15px; background: #ef4444; color: white; width: 85%; padding: 14px; border-radius: 8px; font-weight: bold; }
        
        .stat-group { background: #1e293b; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #38bdf8; text-align: left; }
        .stat-title { font-size: 14px; font-weight: bold; color: #f8fafc; margin-bottom: 4px; border-bottom: 1px solid #334155; padding-bottom: 4px;}
        .stat-detail { font-size: 12px; color: #cbd5e1; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .stat-val { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>
<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <button id="btn-auto-stop" class="hidden">■ 自動操作を終了</button>
    
    <div id="title-layer" class="ui-layer">
        <div class="menu-content" style="pointer-events: none;">
            <h1>MEGA BREAKOUT</h1>
            <div class="subtitle">VERSION 22</div>
            <div class="blink">画面をタップしてスタート</div>
        </div>
    </div>
    
    <div id="equip-layer" class="ui-layer hidden">
        <div class="menu-content">
            <h2 id="equip-title">装備変更 & 再挑戦</h2>
            <div id="pt-label" class="stats-text">所持ポイント: 0 pt</div>
            <div id="auto-max-label" class="sub-text">手動最高到達: 0層</div>
            
            <button id="btn-main" class="equip-btn"></button>
            <button id="btn-sub" class="equip-btn"></button>
            <button id="btn-option" class="equip-btn"></button>
            <button id="btn-acc1" class="equip-btn"></button>
            <button id="btn-acc2" class="equip-btn"></button>
            
            <button id="btn-stats-show" class="equip-btn" style="background: #0ea5e9; margin-top: 15px;">📊 現在のステータス詳細</button>
            
            <div class="gacha-box">
                <button id="btn-gacha-1" class="btn-gacha">ガチャ</button>
                <button id="btn-gacha-all" class="btn-gacha">一括</button>
                <button id="btn-synth-menu" class="btn-synth">合成</button>
            </div>
            
            <button id="btn-start" class="btn-start">▶︎ 通常スタート</button>
            <button id="btn-auto-start" class="btn-auto-start">🤖 自動モード (上限階層でループ)</button>
        </div>
    </div>

    <div id="stats-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2>📊 ステータス詳細</h2>
            <div id="stats-list" class="list-box" style="padding: 5px;"></div>
            <button id="btn-stats-close" class="btn-close">戻る</button>
        </div>
    </div>

    <div id="inventory-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2 id="inv-title">装備を選択</h2>
            <div id="inv-list" class="list-box"></div>
            <button id="btn-inv-close" class="btn-close">戻る</button>
        </div>
    </div>

    <div id="synth-modal" class="ui-layer modal hidden">
        <div class="menu-content">
            <h2>装備合成</h2>
            <p class="sub-text">LvMAXのガチャ装備を2つ選択してください</p>
            <div id="synth-list" class="list-box"></div>
            <button id="btn-synth-exec" class="equip-btn" style="background: #8b5cf6; margin-top: 15px;">合成実行 (2つ選択)</button>
            <button id="btn-synth-close" class="btn-close">戻る</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 1. サウンド管理
// ==========================================
let audioCtx = null;
const Sound = {
    play: function(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(100, now+0.1); gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(now); osc.stop(now+0.1); }
            else if (type === 'explosion') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now+0.2); gainNode.gain.setValueAtTime(0.15, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.2); osc.start(now); osc.stop(now+0.2); }
            else if (type === 'powerup') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(1200, now+0.2); gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0.01, now+0.2); osc.start(now); osc.stop(now+0.2); }
            else if (type === 'laser') { osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now+0.1); gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now+0.1); osc.start(now); osc.stop(now+0.1); }
        } catch(e) {}
    }
};

// ==========================================
// 2. アイテム定義とセーブデータ管理
// ==========================================
const ITEM_DEFS = {
    'none': {cat: 'none', name: '【空き】', short: 'なし'},
    'main_normal': {cat: 'main', name: 'ﾉｰﾏﾙﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ威力'},
    'main_rapid': {cat: 'main', name: 'ﾗﾋﾟｯﾄﾞﾎﾞｰﾙ', short: 'ﾎﾞｰﾙ速度'},
    'main_pierce': {cat: 'main', name: '貫通ﾎﾞｰﾙ[RARE]', short: 'ﾎﾞｰﾙ貫通'},
    'main_exp_rad': {cat: 'main', name: '爆発ﾎﾞｰﾙ(広域)', short: 'ﾎﾞｰﾙ爆発範囲'},
    'main_exp_dmg': {cat: 'main', name: '爆発ﾎﾞｰﾙ(威力)', short: 'ﾎﾞｰﾙ爆発威力'},
    'sub_lsr_dmg': {cat: 'sub', name: 'ﾚｰｻﾞｰ(威力)', short: 'ﾚｰｻﾞｰ威力'},
    'sub_lsr_spd': {cat: 'sub', name: 'ﾚｰｻﾞｰ(速射)', short: 'ﾚｰｻﾞｰ速射'},
    'sub_lsr_prc': {cat: 'sub', name: 'ﾚｰｻﾞｰ(貫通)[RARE]', short: 'ﾚｰｻﾞｰ貫通'},
    'sub_lsr_thk': {cat: 'sub', name: 'ﾚｰｻﾞｰ(太さ)[RARE]', short: 'ﾚｰｻﾞｰ太さ'},
    'sub_msl_dmg': {cat: 'sub', name: 'ﾐｻｲﾙ(威力)', short: 'ﾐｻｲﾙ威力'},
    'sub_msl_spd': {cat: 'sub', name: 'ﾐｻｲﾙ(速度)', short: 'ﾐｻｲﾙ速度'},
    'sub_msl_rad': {cat: 'sub', name: 'ﾐｻｲﾙ(範囲)', short: 'ﾐｻｲﾙ範囲'},
    'sub_msl_cnt': {cat: 'sub', name: 'ﾐｻｲﾙ(弾数)', short: 'ﾐｻｲﾙ弾数'},
    'sub_bomb_req': {cat: 'sub', name: 'ﾎﾞﾑ(ｺｽﾄ減)', short: 'ﾎﾞﾑｺｽﾄ削減'},
    'opt_rot_cnt': {cat: 'opt', name: '回転ﾊﾞﾘｱ(枚数)', short: '回転ﾊﾞﾘｱ枚数'},
    'opt_rot_size': {cat: 'opt', name: '回転ﾊﾞﾘｱ(ｻｲｽﾞ)', short: '回転ﾊﾞﾘｱｻｲｽﾞ'},
    'opt_rot_spd': {cat: 'opt', name: '回転ﾊﾞﾘｱ(速度)', short: '回転ﾊﾞﾘｱ速度'},
    'opt_pill_size': {cat: 'opt', name: 'ﾄｰﾁｶ(ｻｲｽﾞ)', short: 'ﾄｰﾁｶｻｲｽﾞ'},
    'opt_pill_cnt': {cat: 'opt', name: 'ﾄｰﾁｶ(設置数)', short: 'ﾄｰﾁｶ数'},
    'opt_pill_hp': {cat: 'opt', name: 'ﾄｰﾁｶ(強度)', short: 'ﾄｰﾁｶ強度'},
    'acc_ball_cnt': {cat: 'acc', name: '初期弾数追加[RARE]', short: '初期弾数'},
    'acc_sat_hp': {cat: 'acc', name: '子機(体力)', short: '子機体力'},
    'acc_sat_spd': {cat: 'acc', name: '子機(移動速度)', short: '子機速度'},
    'acc_sat_cnt': {cat: 'acc', name: '子機(追加)', short: '子機数'},
    'acc_score_up': {cat: 'acc', name: '獲得ﾎﾟｲﾝﾄUP', short: 'ﾎﾟｲﾝﾄ獲得量'},
    'acc_life_up': {cat: 'acc', name: '最大ﾗｲﾌUP', short: '最大ﾗｲﾌ'}
};

const GACHA_POOL = Object.keys(ITEM_DEFS).filter(k => k !== 'none');

const APPLY_EFFECTS = {
    'main_normal': (l, s) => { s.mainDmg += l; },
    'main_rapid': (l, s) => { s.mainSpeed += l * 0.5; },
    'main_pierce': (l, s) => { s.mainPierce += l; },
    'main_exp_rad': (l, s) => { s.hasExp = true; s.mainExplodeRad += l * 10; },
    'main_exp_dmg': (l, s) => { s.hasExp = true; s.mainExplodeDmg += l; },
    'sub_lsr_dmg': (l, s) => { s.lsrDmg += l; },
    'sub_lsr_spd': (l, s) => { s.lsrInterval = Math.max(4, 40 - l * 2); },
    'sub_lsr_prc': (l, s) => { s.lsrPierce += l; },
    'sub_lsr_thk': (l, s) => { s.lsrWidth += l * 3; },
    'sub_msl_dmg': (l, s) => { s.hasMsl = true; s.mslDmg += l * 2; },
    'sub_msl_spd': (l, s) => { s.hasMsl = true; s.mslSpd += l * 0.2; },
    'sub_msl_rad': (l, s) => { s.hasMsl = true; s.mslRad += l * 15; },
    'sub_msl_cnt': (l, s) => { s.hasMsl = true; s.mslCnt += l; },
    'sub_bomb_req': (l, s) => { s.bombReq -= l; },
    'opt_rot_cnt': (l, s) => { s.rotCnt += l; },
    'opt_rot_size': (l, s) => { s.rotSize += l * 2; },
    'opt_rot_spd': (l, s) => { s.rotSpd += l * 0.01; },
    'opt_pill_size': (l, s) => { s.pillSize += l * 4; },
    'opt_pill_cnt': (l, s) => { s.pillCnt += l; },
    'opt_pill_hp': (l, s) => { s.pillHp += l * 2; },
    'acc_ball_cnt': (l, s) => { s.accBalls += l; },
    'acc_sat_hp': (l, s) => { s.satHp += l * 2; },
    'acc_sat_spd': (l, s) => { s.satSpd += l * 1.5; },
    'acc_sat_cnt': (l, s) => { s.satCnt += l; },
    'acc_score_up': (l, s) => { s.scoreMult += l * 0.5; },
    'acc_life_up': (l, s) => { s.maxLife += l; }
};

class SaveData {
    constructor() { this.load(); }
    load() {
        let data = {}; 
        try { 
            const str = localStorage.getItem('megabreakout_save_v22');
            if (str) data = JSON.parse(str); 
        } catch(e) {}
        this.loadout = data.loadout || {main: 'main_normal', sub: 'none', option: 'none', acc1: 'none', acc2: 'none'};
        this.total_points = data.total_points || 0;
        this.item_counts = data.item_counts || {'main_normal': 1};
        this.custom_items = data.custom_items || {};
        this.synth_items = data.synth_items || {};
        this.max_manual_layer = data.max_manual_layer || 0;
    }
    save() { 
        try { 
            localStorage.setItem('megabreakout_save_v22', JSON.stringify(this)); 
        } catch(e) {} 
    }
    getLevel(itemId) {
        if (!itemId || itemId === 'none') return 0;
        const c = this.item_counts[itemId] || 0;
        return c <= 0 ? 0 : Math.min(20, Math.floor(Math.log2(c)) + 1);
    }
}
const save = new SaveData();

function calcCurrentStats() {
    let s = {
        mainDmg: 1, mainPierce: 0, hasExp: false, mainExplodeRad: 40, mainExplodeDmg: 1, mainSpeed: 4,
        lsrInterval: 40, lsrPierce: 0, lsrWidth: 4, lsrDmg: 1,
        hasMsl: false, mslCnt: 1, mslSpd: 1.0, mslRad: 50, mslDmg: 1,
        satCnt: 0, satHp: 1, satSpd: 2, accBalls: 0,
        bombReq: 20, rotCnt: 0, rotSize: 8, rotSpd: 0.05, pillCnt: 0, pillSize: 30, pillHp: 1,
        scoreMult: 1, maxLife: 3
    };
    ['main', 'sub', 'option', 'acc1', 'acc2'].forEach(slot => {
        const itemId = save.loadout[slot];
        if (itemId === 'none') return;
        let slotCat = slot.replace(/\d/, ''); if (slotCat === 'option') slotCat = 'opt';
        if (save.custom_items[itemId] || save.synth_items[itemId]) {
            const itemData = save.custom_items[itemId] || save.synth_items[itemId];
            const itemLvl = Number(itemData.level) || 1;
            (itemData.effects || []).forEach(ef => {
                if (ITEM_DEFS[ef.type]) {
                    const actualLevel = (Number(ef.level) || 0) * itemLvl;
                    if (actualLevel > 0) {
                        if (slotCat === 'opt' || slotCat === 'acc' || ITEM_DEFS[ef.type].cat === slotCat || itemData.cat === 'mix') APPLY_EFFECTS[ef.type](actualLevel, s);
                    } else APPLY_EFFECTS[ef.type](actualLevel, s);
                }
            });
        } else {
            const lvl = save.getLevel(itemId);
            if (APPLY_EFFECTS[itemId]) APPLY_EFFECTS[itemId](lvl, s);
        }
    });
    // 制約
    s.maxLife = Math.max(1, s.maxLife);
    s.mslSpd = Math.max(0.1, s.mslSpd);
    return s;
}

// ==========================================
// 3. ゲームエンジン
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = document.getElementById('game-wrapper').clientWidth; canvas.height = document.getElementById('game-wrapper').clientHeight; }
window.addEventListener('resize', resize); resize();
function intersect(a, b) { return Math.abs(a.x - b.x) < (a.w + b.w) / 2 && Math.abs(a.y - b.y) < (a.h + b.h) / 2; }

class Game {
    constructor() {
        this.state = 'TITLE'; this.ctrlY = canvas.height - 150;
        this.paddle = { w: 80, h: 15, x: canvas.width / 2, y: this.ctrlY - 20 };
        this.autoMode = false;
        this.resetGameVars(); this.bindEvents(); this.loop = this.loop.bind(this); requestAnimationFrame(this.loop);
    }

    buildStats() { this.s = calcCurrentStats(); this.topMargin = 90; this.ROW_H = (this.ctrlY - this.topMargin) / 20; }

    resetGameVars() {
        this.stage = 1; this.totalLayers = 0; this.blocksDestroyed = 0; this.columns = 6;
        this.advanceTimer = 0; this.subTimer = 0; this.bossTimer = 0; this.bombCount = 0;
        this.laserActiveTime = 0; this.giantActiveTime = 0;
        this.balls = []; this.items = []; this.lasers = []; this.missiles = []; this.enemyBullets = [];
        this.blocks = []; this.fallingBlocks = []; this.effects = []; this.floatingTexts = [];
        this.barrierNodes = []; this.staticBarriers = []; this.satellites = [];
        this.boss = null; this.barrierAngle = 0; this.gameOver = false; this.pendingRestart = false;
    }

    initGame() {
        this.resetGameVars(); this.buildStats();
        this.ctrlY = canvas.height - 150; this.paddle.y = this.ctrlY - 20;
        this.lives = this.s.maxLife;
        this.spawnBarriers(); this.spawnStaticBarriers(); this.spawnSatellites();
        for (let i = 0; i < 5; i++) this.spawnRow(this.topMargin + (i * this.ROW_H));
        const initialBalls = 1 + this.s.accBalls;
        for (let i = 0; i < initialBalls; i++) this.spawnBall(canvas.width / 2 + (Math.random()*20-10), this.paddle.y - 30);
        this.state = 'PLAYING';
    }

    advanceLayer() {
        if (this.autoMode && this.totalLayers >= save.max_manual_layer && save.max_manual_layer > 0) { this.pendingRestart = true; return; }
        this.advanceTimer = 0; this.totalLayers++;
        if (!this.autoMode && this.totalLayers > save.max_manual_layer) { save.max_manual_layer = this.totalLayers; save.save(); document.getElementById('auto-max-label').innerText = `手動最高到達: ${save.max_manual_layer}層`; }
        this.blocks.forEach(b => { b.y += this.ROW_H; });
        this.spawnRow(this.topMargin); 
        if (this.totalLayers > 0 && this.totalLayers % 10 === 0) this.spawnBoss();
    }

    spawnRow(yPos) {
        const bw = canvas.width / this.columns;
        for (let col = 0; col < this.columns; col++) {
            if (this.stage >= 5 && Math.random() < 0.3) { this.createBlock(col * bw + bw / 4, yPos, bw / 2); this.createBlock(col * bw + (bw * 3) / 4, yPos, bw / 2); } 
            else { this.createBlock(col * bw + bw / 2, yPos, bw); }
        }
    }

    createBlock(x, y, w) {
        const r = Math.random(); let bType = 'normal', color = '#10b981';
        // ★ 赤ブロック出現条件を10層以上に緩和
        if (r < 0.05 && this.totalLayers >= 15) { bType = 'hard'; color = '#475569'; } 
        else if (r < 0.15 && this.totalLayers >= 10) { bType = 'red'; color = '#ef4444'; } 
        else if (r < 0.22) { bType = 'blue'; color = '#3b82f6'; } 
        else if (r < 0.28) { bType = 'laser_item'; color = '#facc15'; } 
        else if (r < 0.30) { bType = 'giant_item'; color = '#a855f7'; } 
        else if (r < 0.35 && this.totalLayers >= 5) { bType = 'bomb'; color = '#334155'; } 
        
        let hp = 1;
        if (bType === 'normal' && this.totalLayers >= 4) {
            let hpRate = Math.min(0.05 + (this.totalLayers - 4) * 0.01, 0.4);
            if (Math.random() < hpRate) { hp = Math.floor(Math.random() * (1 + Math.floor(this.totalLayers / 5))) + 1; if (hp > 1) color = '#14b8a6'; }
        }
        if (bType === 'red') hp += Math.floor(this.totalLayers / 10);
        if (bType === 'hard') hp = 3 + Math.floor(this.totalLayers / 10);
        this.blocks.push({ x, y, w: w - 4, h: this.ROW_H - 4, color, bType, hp, cool: 0 });
    }

    spawnBall(x, y) {
        let vx = (Math.random() > 0.5 ? this.s.mainSpeed : -this.s.mainSpeed);
        this.balls.push({ x, y, w: 14, h: 14, color: '#f8fafc', vx: vx, vy: -this.s.mainSpeed, damage: this.s.mainDmg, activePierce: 0, activeExpRad: 0, activeExpDmg: 0, isLarge: false });
    }

    spawnBarriers() { this.barrierNodes = []; for (let i = 0; i < this.s.rotCnt; i++) this.barrierNodes.push({ w: this.s.rotSize, h: this.s.rotSize }); }
    spawnStaticBarriers() {
        this.staticBarriers = []; if (this.s.pillCnt <= 0) return;
        let spacing = canvas.width / (this.s.pillCnt + 1);
        for (let i = 1; i <= this.s.pillCnt; i++) this.staticBarriers.push({ x: spacing * i, y: this.ctrlY - 60, w: this.s.pillSize, h: 12, hp: this.s.pillHp });
    }
    spawnSatellites() {
        this.satellites = []; if (this.s.satCnt <= 0) return;
        let spacing = canvas.width / (this.s.satCnt + 1);
        for (let i = 0; i < this.s.satCnt; i++) this.satellites.push({ x: spacing * (i+1), y: this.paddle.y, w: 24, h: 10, hp: this.s.satHp, maxHp: this.s.satHp, dx: 0 });
    }

    spawnItem(x, y, bType) {
        let c = 'white', w = 20;
        if (bType === 'blue') c = '#3b82f6'; else if (bType === 'laser_item') c = '#facc15';
        else if (bType === 'giant_item') { c = '#a855f7'; bType = 'large_ball'; }
        else if (bType === 'boss_drop') { c = '#f59e0b'; w = 25; } else if (bType === 'bomb_item') { c = '#ec4899'; w = 22; }
        this.items.push({ x, y, w, h: w, color: c, bType });
    }

    spawnBoss() { this.state = 'BOSS'; this.boss = { x: canvas.width / 2, y: -60, w: 150, h: 60, color: '#ec4899', hp: 30 + (this.stage * 20), targetY: this.topMargin + 20 }; Sound.play('laser'); }

    update() {
        if (this.state === 'TITLE' || this.state === 'EQUIP' || this.gameOver) return;
        if (this.pendingRestart) { save.save(); this.initGame(); return; }
        this.handleAutoMode(); this.subTimer++;
        this.moveBalls(); this.movePlayerWeapons(); this.moveEnemiesAndItems(); this.moveSatellitesAndBarriers();
        this.handleCollisions();
        if (this.pendingRestart) return;
        this.checkRules();
        if (this.state === 'BOSS') this.updateBoss();
    }

    moveBalls() {
        if (this.giantActiveTime > 0) { this.giantActiveTime--; this.balls.forEach(b => { b.isLarge = true; b.w = 28; b.h = 28; }); } 
        else { this.balls.forEach(b => { b.isLarge = false; b.w = 14; b.h = 14; }); }
        for (let i = this.balls.length - 1; i >= 0; i--) {
            let b = this.balls[i]; b.x += b.vx; b.y += b.vy;
            let hw = b.w / 2; let wallHit = false;
            if (b.x <= hw || b.x >= canvas.width - hw) { b.vx *= -1; wallHit = true; }
            if (b.y <= hw) { b.vy *= -1; wallHit = true; }
            if (b.y > this.ctrlY) { this.balls.splice(i, 1); continue; }
            if (wallHit) { b.activePierce = 0; b.activeExpDmg = 0; b.activeExpRad = 0; }
        }
    }

    movePlayerWeapons() {
        if (this.laserActiveTime > 0) {
            this.laserActiveTime--;
            if (this.subTimer % this.s.lsrInterval === 0) { this.lasers.push({ x: this.paddle.x, y: this.paddle.y - 20, w: this.s.lsrWidth, h: 30, color: '#facc15', vy: -12, damage: this.s.lsrDmg, pierce: this.s.lsrPierce }); Sound.play('laser'); }
        }
        if (this.s.hasMsl && this.subTimer % 120 === 0) {
            for(let i=0; i<this.s.mslCnt; i++) {
                let dx = (i - (this.s.mslCnt-1)/2) * 30;
                this.missiles.push({ x: this.paddle.x + dx, y: this.paddle.y - 20, w: 8, h: 20, vy: -this.s.mslSpd, damage: this.s.mslDmg, radius: this.s.mslRad, color: '#f97316' });
            }
        }
        for (let i = this.lasers.length - 1; i >= 0; i--) { let l = this.lasers[i]; l.y += l.vy; if (l.y < -50) this.lasers.splice(i, 1); }
        for (let i = this.missiles.length - 1; i >= 0; i--) { 
            let m = this.missiles[i]; m.y += m.vy; 
            let hit = false;
            for (let b of this.blocks) { if (intersect(m, b)) { hit = true; break; } }
            if (!hit && this.boss && intersect(m, this.boss)) hit = true;
            if (hit) { this.triggerAOE(m.x, m.y, m.damage, m.radius); this.missiles.splice(i, 1); } else if (m.y < -50) this.missiles.splice(i, 1);
        }
    }

    moveEnemiesAndItems() {
        for (let i = this.enemyBullets.length - 1; i >= 0; i--) { let b = this.enemyBullets[i]; b.x += b.vx; b.y += b.vy; if (b.y > this.ctrlY + 50) this.enemyBullets.splice(i, 1); }
        for (let i = this.fallingBlocks.length - 1; i >= 0; i--) { let fb = this.fallingBlocks[i]; fb.x += fb.vx; fb.y += fb.vy; if (fb.y > this.ctrlY + 50) this.fallingBlocks.splice(i, 1); }
        for (let i = this.items.length - 1; i >= 0; i--) { this.items[i].y += 4; if (this.items[i].y > this.ctrlY + 50) this.items.splice(i, 1); }
        if (this.state !== 'BOSS') { this.advanceTimer += 1/60; if (this.advanceTimer >= Math.max(1.0, 10.0 - Math.floor(this.totalLayers / 100) * 1.0)) this.advanceLayer(); }
        this.blocks.forEach(b => { if(b.cool > 0) b.cool--; });
    }

    moveSatellitesAndBarriers() {
        if (this.barrierNodes.length > 0) {
            this.barrierAngle += this.s.rotSpd; const radius = this.paddle.w / 2 + 25;
            this.barrierNodes.forEach((b, i) => { const angle = this.barrierAngle + (i * (2 * Math.PI / this.barrierNodes.length)); b.x = this.paddle.x + Math.cos(angle) * radius; b.y = this.paddle.y + Math.sin(angle) * radius; });
        }
        if (this.satellites.length > 0) {
            this.satellites.forEach((sat, i) => {
                let targetX = canvas.width / 2, closestDist = Infinity, targetBall = null;
                this.balls.forEach(b => { let dist = Math.abs(b.x - sat.x) + Math.abs(this.ctrlY - b.y) * 2; if (b.vy > 0 && dist < closestDist) { closestDist = dist; targetBall = b; } });
                if (!targetBall && this.balls.length > 0) targetBall = this.balls[0];
                if (targetBall) targetX = targetBall.x;
                let sep = 0; this.satellites.forEach((other, j) => { if (i !== j) { let diff = sat.x - other.x; if (Math.abs(diff) < 30) sep += (diff > 0 ? 1 : -1) * (30 - Math.abs(diff)); } });
                targetX += sep + (i % 2 === 0 ? 10 : -10);
                sat.x += (targetX - sat.x) * (this.s.satSpd * 0.03) + Math.sign(targetX - sat.x) * (this.s.satSpd * 0.5);
                sat.x = Math.max(sat.w/2, Math.min(canvas.width - sat.w/2, sat.x)); sat.y = this.paddle.y;
            });
        }
    }

    updateBoss() {
        if (!this.boss) return;
        if (this.boss.y < this.boss.targetY) this.boss.y += 1;
        this.bossTimer += 0.03; this.boss.x = canvas.width / 2 + Math.sin(this.bossTimer * 2) * 100;
        if (Math.random() < 0.005 + (this.stage * 0.002)) {
            const r = Math.random();
            if (r < 0.7) this.fireEnemyAttack(this.boss.x, this.boss.y + 30, 'bullet', true); else if (r < 0.9) this.fireEnemyAttack(this.boss.x, this.boss.y + 30, 'laser');
            else this.fireEnemyAttack(this.boss.x, this.boss.y + 30, 'falling_block');
        }
    }

    handleCollisions() {
        this.balls.forEach(ball => {
            let bounced = false;
            this.satellites.forEach(sat => { if (intersect(ball, sat) && ball.vy > 0) { ball.vy *= -1; ball.vx = (ball.x - sat.x) * 0.2; bounced = true; Sound.play('hit'); } });
            if (!bounced && intersect(ball, this.paddle) && ball.vy > 0) { ball.vy *= -1; ball.vx = (ball.x - this.paddle.x) * 0.15; bounced = true; Sound.play('hit'); }
            if (bounced) { ball.activePierce = this.s.mainPierce; ball.activeExpDmg = this.s.hasExp ? this.s.mainExplodeDmg : 0; ball.activeExpRad = this.s.hasExp ? this.s.mainExplodeRad : 0; }
            if (ball.isLarge) { for (let i = this.enemyBullets.length - 1; i >= 0; i--) { if (intersect(ball, this.enemyBullets[i])) this.enemyBullets.splice(i, 1); } }
        });
        for (let i = this.items.length - 1; i >= 0; i--) { if (intersect(this.items[i], this.paddle)) { try { this.applyItem(this.items.splice(i, 1)[0]); } catch(e) {} } }
        for (let i = this.enemyBullets.length - 1; i >= 0; i--) {
            let b = this.enemyBullets[i], hit = false;
            for (let st of this.staticBarriers) { if(intersect(st, b)) { hit = true; st.hp--; break; } }
            if (!hit) { for(let s of this.satellites) { if(intersect(s, b)) { hit = true; s.hp--; if(s.hp<=0) this.effects.push({x:s.x, y:s.y, r:20, life:1.0, color:'#a855f7'}); break; } } }
            if (!hit && intersect(b, this.paddle)) { this.loseLife(); hit = true; }
            if (hit) this.enemyBullets.splice(i, 1); if (this.pendingRestart) return;
        }
        for (let i = this.fallingBlocks.length - 1; i >= 0; i--) { if (intersect(this.fallingBlocks[i], this.paddle)) { this.loseLife(); this.fallingBlocks.splice(i, 1); } }
        const projectiles = [...this.balls, ...this.lasers];
        projectiles.forEach(p => {
            if (this.boss && intersect(p, this.boss)) { this.hitBoss(p); return; }
            for (let i = this.blocks.length - 1; i >= 0; i--) { if (intersect(p, this.blocks[i])) { this.hitBlock(p, i); return; } }
            for (let i = this.fallingBlocks.length - 1; i >= 0; i--) { if (intersect(p, this.fallingBlocks[i])) { this.hitFallingBlock(p, i); return; } }
        });
    }

    applyItem(item) {
        if (item.bType === 'blue') this.spawnBall(this.paddle.x, this.paddle.y - 20);
        else if (item.bType === 'large_ball') this.giantActiveTime = 300;
        else if (item.bType === 'laser_item') this.laserActiveTime = 300;
        else if (item.bType === 'bomb_item') {
            this.bombCount++;
            if (this.bombCount >= this.s.bombReq) {
                this.bombCount = 0; Sound.play('explosion'); this.blocks.forEach(() => { save.total_points += Math.floor(10 * this.s.scoreMult); this.blocksDestroyed++; }); this.blocks = [];
                this.effects.push({ x: canvas.width/2, y: this.ctrlY, r: canvas.width*1.5, life: 0.5, color: 'rgba(236, 72, 153, 0.3)' }); this.addFloatingText(`BOMB!`, canvas.width/2, this.ctrlY - 50, '#ec4899');
            } else Sound.play('coin');
        } else if (item.bType === 'boss_drop') {
            const drop = generateCustomDrop(this.totalLayers, ['main', 'sub', 'opt', 'acc'][Math.floor(Math.random() * 4)]);
            save.custom_items[drop.id] = drop; save.save(); Sound.play('powerup'); this.addFloatingText(`★ ITEM! ★`, this.paddle.x, this.paddle.y, '#f59e0b');
        }
        if (item.bType !== 'boss_drop' && item.bType !== 'bomb_item') Sound.play('powerup');
    }

    hitBlock(p, idx) {
        const b = this.blocks[idx]; const isL = (p.vy === -12);
        if (b.bType === 'hard') {
            Sound.play('hit'); if (isL) { this.lasers = this.lasers.filter(l => l !== p); } else { p.activePierce = 0; p.vy *= -1; p.activeExpDmg = 0; p.activeExpRad = 0; }
            let dmg = (p.damage || 1) * (p.isLarge ? 3 : 1); b.hp -= dmg; if (b.hp <= 0) this.destroyBlock(idx); return;
        }
        let dmg = (p.damage || 1) * (p.isLarge ? 3 : 1); b.hp -= dmg;
        if (b.bType === 'red' && b.hp > 0 && b.cool <= 0) { this.fireEnemyAttack(b.x, b.y, 'bullet', true); b.cool = 20; }
        if (b.hp <= 0) this.destroyBlock(idx); else Sound.play('hit');
        if (isL) { if (p.pierce > 0) p.pierce--; else this.lasers = this.lasers.filter(l => l !== p); } 
        else { if (p.activeExpDmg > 0) this.triggerAOE(b.x, b.y, p.activeExpDmg, p.activeExpRad); if (p.activePierce > 0) p.activePierce--; else { p.vy *= -1; p.activePierce = 0; p.activeExpDmg = 0; p.activeExpRad = 0; } }
    }

    hitFallingBlock(p, idx) {
        const b = this.fallingBlocks[idx]; const isL = (p.vy === -12);
        let dmg = (p.damage || 1) * (p.isLarge ? 3 : 1); b.hp -= dmg;
        if (b.hp <= 0) { Sound.play('explosion'); save.total_points += Math.floor(50 * this.s.scoreMult); this.fallingBlocks.splice(idx, 1); } else Sound.play('hit');
        if (isL) { if (p.pierce > 0) p.pierce--; else this.lasers = this.lasers.filter(l => l !== p); } 
        else { if (p.activeExpDmg > 0) this.triggerAOE(b.x, b.y, p.activeExpDmg, p.activeExpRad); if (p.activePierce > 0) p.activePierce--; else { p.vy *= -1; p.activePierce = 0; p.activeExpDmg = 0; p.activeExpRad = 0; } }
    }

    destroyBlock(idx) {
        const b = this.blocks[idx];
        if (b.bType === 'red') this.fireEnemyAttack(b.x, b.y, 'bullet', true);
        else if (b.bType === 'bomb') { Sound.play('explosion'); for (let a = 0; a < 360; a += 45) { let rad = a * Math.PI / 180; this.enemyBullets.push({ x: b.x, y: b.y, w: 10, h: 10, color: '#ef4444', vx: Math.cos(rad)*4, vy: Math.sin(rad)*4 }); } }
        else if (b.bType !== 'normal' && b.bType !== 'hard') this.spawnItem(b.x, b.y, b.bType);
        if (Math.random() < 0.05) this.spawnItem(b.x, b.y, 'bomb_item');
        this.blocks.splice(idx, 1); save.total_points += Math.floor(10 * this.s.scoreMult); this.blocksDestroyed++;
    }

    triggerAOE(x, y, damage, radius) {
        this.effects.push({ x, y, r: radius, life: 1.0, color: 'rgba(245, 158, 11, 0.5)' }); Sound.play('explosion');
        for (let i = this.blocks.length - 1; i >= 0; i--) { if (this.blocks[i].bType !== 'hard' && Math.hypot(this.blocks[i].x - x, this.blocks[i].y - y) <= radius) { this.blocks[i].hp -= damage; if (this.blocks[i].hp <= 0) this.destroyBlock(i); } }
    }

    hitBoss(p) {
        let dmg = (p.damage || 1) * (p.isLarge ? 3 : 1); this.boss.hp -= dmg; Sound.play('hit');
        const isL = (p.vy === -12);
        if (isL) { if (p.pierce > 0) p.pierce--; else this.lasers = this.lasers.filter(l => l !== p); } 
        else { if (p.activeExpDmg > 0) this.triggerAOE(this.boss.x, this.boss.y, p.activeExpDmg, p.activeExpRad); if (p.activePierce > 0) p.activePierce--; else { p.vy *= -1; p.activePierce = 0; p.activeExpDmg = 0; p.activeExpRad = 0; } }
        if (this.boss.hp <= 0) { save.total_points += Math.floor(500 * this.s.scoreMult); if (Math.random() < 0.3) this.spawnItem(this.boss.x, this.boss.y, 'boss_drop'); this.boss = null; this.state = 'PLAYING'; Sound.play('explosion'); this.stage++; }
    }

    checkRules() {
        if (this.balls.length === 0 && !this.gameOver && !this.pendingRestart) { this.lives--; Sound.play('explosion'); if (this.lives <= 0) { if (this.autoMode) { this.pendingRestart = true; } else { this.gameOver = true; document.getElementById('btn-auto-stop').classList.add('hidden'); showEquipMenu("GAME OVER"); } } else { this.spawnBall(canvas.width / 2, this.paddle.y - 30); } }
        if (this.blocks.some(b => b.y >= this.topMargin + 19 * this.ROW_H)) { if (this.autoMode) { this.pendingRestart = true; } else { this.gameOver = true; showEquipMenu("防衛失敗..."); } }
        if (this.blocksDestroyed >= 6 && this.state !== 'BOSS') { this.blocksDestroyed = 0; this.advanceLayer(); }
    }

    addFloatingText(text, x, y, color) { this.floatingTexts.push({ text, x, y, color, life: 1.0 }); }

    draw() {
        ctx.fillStyle = (this.state === 'TITLE') ? '#0f172a' : '#1e293b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (this.state === 'TITLE' || this.state === 'EQUIP') return;
        ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)'; ctx.beginPath(); ctx.moveTo(0, this.topMargin + 19 * this.ROW_H); ctx.lineTo(canvas.width, this.topMargin + 19 * this.ROW_H); ctx.stroke();
        ctx.fillStyle = '#0f172a'; ctx.fillRect(0, this.ctrlY, canvas.width, canvas.height - this.ctrlY);
        ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; ctx.fillRect(0, this.ctrlY, canvas.width, 2);
        let st = 35; ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.fillRect(0, 0, canvas.width, 50 + st);
        ctx.fillStyle = '#38bdf8'; ctx.font = '14px Helvetica-Bold'; ctx.textAlign = 'center';
        ctx.fillText(`Lv.${this.totalLayers} | ${this.autoMode ? "[AUTO]" : "LIFE:"+this.lives} | PTS: ${save.total_points}`, canvas.width/2, 20 + st);
        ctx.fillStyle = '#94a3b8'; ctx.font = '12px Helvetica-Bold'; ctx.fillText(`MAX: Lv.${save.max_manual_layer} | BOMB: ${this.bombCount}/${this.s.bombReq}`, canvas.width/2, 40 + st);
        this.blocks.forEach(b => { ctx.fillStyle = b.color; ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h); if (b.bType === 'blue') { ctx.fillStyle = '#fff'; ctx.font = '12px Helvetica-Bold'; ctx.fillText('+1', b.x, b.y + 4); } else if (b.hp > 1 && b.bType !== 'bomb') { ctx.fillStyle = (b.bType==='hard')?'#fff':'#111'; ctx.font = '12px Helvetica-Bold'; ctx.fillText(b.hp, b.x, b.y + 4); } else if (b.bType === 'bomb') { ctx.fillStyle = '#fff'; ctx.font = '12px Helvetica-Bold'; ctx.fillText('✖', b.x, b.y + 4); } });
        this.fallingBlocks.forEach(fb => { ctx.fillStyle = fb.color; ctx.fillRect(fb.x - fb.w/2, fb.y - fb.h/2, fb.w, fb.h); if (fb.hp > 1) { ctx.fillStyle = '#fff'; ctx.font = '12px Helvetica-Bold'; ctx.fillText(fb.hp, fb.x, fb.y + 4); } });
        this.items.forEach(i => { ctx.fillStyle = i.color; ctx.fillRect(i.x - i.w/2, i.y - i.h/2, i.w, i.h); if(i.bType==='bomb_item') { ctx.fillStyle='white'; ctx.font='14px Helvetica-Bold'; ctx.fillText('B', i.x, i.y+5); } else if(i.bType==='laser_item') { ctx.fillStyle='black'; ctx.font='14px Helvetica-Bold'; ctx.fillText('L', i.x, i.y+5); } else if(i.bType==='blue') { ctx.fillStyle='white'; ctx.font='12px Helvetica-Bold'; ctx.fillText('+1', i.x, i.y+4); } });
        this.enemyBullets.forEach(b => { ctx.fillStyle = b.color; ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h); }); 
        this.lasers.forEach(l => { ctx.fillStyle = l.color; ctx.fillRect(l.x - l.w/2, l.y - l.h/2, l.w, l.h); }); 
        this.missiles.forEach(m => { ctx.fillStyle = m.color; ctx.fillRect(m.x - m.w/2, m.y - m.h/2, m.w, m.h); ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.fillText('▲', m.x, m.y + 4); });
        this.balls.forEach(b => { if (b.activePierce > 0 || b.activeExpDmg > 0) { ctx.shadowBlur = 10; ctx.shadowColor = b.activePierce > 0 ? '#38bdf8' : '#f59e0b'; } ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; });
        ctx.fillStyle = this.paddle.color || '#fff'; ctx.fillRect(this.paddle.x - this.paddle.w/2, this.paddle.y - this.paddle.h/2, this.paddle.w, this.paddle.h);
        this.barrierNodes.forEach(b => { ctx.fillStyle = '#34d399'; ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h); });
        this.staticBarriers.forEach(st => { ctx.fillStyle = '#64748b'; ctx.fillRect(st.x - st.w/2, st.y - st.h/2, st.w, st.h); });
        this.satellites.forEach(sat => { ctx.fillStyle = '#8b5cf6'; ctx.fillRect(sat.x - sat.w/2, sat.y - sat.h/2, sat.w, sat.h); ctx.fillStyle = 'white'; ctx.fillRect(sat.x - sat.w/2, sat.y - sat.h/2, sat.w * (sat.hp/sat.maxHp), 2); });
        if (this.boss) { ctx.fillStyle = this.boss.color; ctx.fillRect(this.boss.x - this.boss.w/2, this.boss.y - this.boss.h/2, this.boss.w, this.boss.h); ctx.fillStyle = '#fff'; ctx.font = '16px Helvetica-Bold'; ctx.fillText(`HP: ${Math.max(0, this.boss.hp)}`, this.boss.x, this.boss.y + 6); }
        for (let i = this.effects.length - 1; i >= 0; i--) { let e = this.effects[i]; ctx.globalAlpha = e.life; ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; e.life -= 0.05; if (e.life <= 0) this.effects.splice(i, 1); }
        for (let i = this.floatingTexts.length - 1; i >= 0; i--) { let ft = this.floatingTexts[i]; ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.font = '14px Helvetica-Bold'; ctx.fillText(ft.text, ft.x, ft.y); ctx.globalAlpha = 1.0; ft.y -= 1; ft.life -= 0.015; if (ft.life <= 0) this.floatingTexts.splice(i, 1); }
    }

    loop() { this.update(); this.draw(); requestAnimationFrame(this.loop); }

    bindEvents() {
        const move = (clientX) => { if ((this.state !== 'PLAYING' && this.state !== 'BOSS') || this.autoMode) return; const rect = canvas.getBoundingClientRect(); let x = (clientX - rect.left) * (canvas.width / rect.width); this.paddle.x = Math.max(this.paddle.w/2, Math.min(canvas.width - this.paddle.w/2, x)); };
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); move(e.touches[0].clientX); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e.touches[0].clientX); }, {passive: false});
        canvas.addEventListener('mousedown', (e) => move(e.clientX));
        canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0) move(e.clientX); });
    }
}
window.game = new Game();

// ==========================================
// 4. UI 制御
// ==========================================
function eId(id) { return document.getElementById(id); }

window.showEquipMenu = function(msg) {
    if(window.game) game.state = 'EQUIP'; 
    ['title-layer', 'inventory-modal', 'synth-modal', 'stats-modal'].forEach(id => eId(id).classList.add('hidden'));
    eId('equip-layer').classList.remove('hidden');
    eId('equip-title').innerText = msg || '装備変更 & 再挑戦';
    eId('pt-label').innerText = `所持ポイント: ${save.total_points} pt`;
    eId('auto-max-label').innerText = `手動最高到達: ${save.max_manual_layer}層`;
    updateAllEquipBtns();
};

function updateAllEquipBtns() {
    ['main', 'sub', 'option', 'acc1', 'acc2'].forEach(slot => {
        const id = save.loadout[slot];
        let name = "装備なし";
        if (id !== 'none') {
            const data = save.custom_items[id] || save.synth_items[id];
            name = data ? `★ ${data.name} [Lv.${data.level || 1}]` : `${ITEM_DEFS[id].name} [Lv.${save.getLevel(id)}]`;
        }
        eId(`btn-${slot}`).innerText = `${slot.toUpperCase()} : ${name}`;
    });
}

// ボタンの紐付け
window.onload = function() {
    eId('title-layer').addEventListener('click', () => { Sound.play('coin'); showEquipMenu(); });
    eId('btn-main').onclick = () => openInventory('main');
    eId('btn-sub').onclick = () => openInventory('sub');
    eId('btn-option').onclick = () => openInventory('option');
    eId('btn-acc1').onclick = () => openInventory('acc1');
    eId('btn-acc2').onclick = () => openInventory('acc2');
    eId('btn-stats-show').onclick = showStats;
    eId('btn-stats-close').onclick = () => showEquipMenu();
    eId('btn-inv-close').onclick = () => showEquipMenu();
    eId('btn-synth-close').onclick = () => showEquipMenu();
    eId('btn-synth-menu').onclick = openSynth;
    eId('btn-synth-exec').onclick = execSynth;
    eId('btn-start').onclick = () => { eId('equip-layer').classList.add('hidden'); game.autoMode = false; game.initGame(); };
    eId('btn-auto-start').onclick = () => { eId('equip-layer').classList.add('hidden'); eId('btn-auto-stop').classList.remove('hidden'); game.autoMode = true; game.initGame(); };
    eId('btn-auto-stop').onclick = () => { game.autoMode = false; eId('btn-auto-stop').classList.add('hidden'); Sound.play('coin'); };
};

function showStats() {
    const s = calcCurrentStats(); const list = eId('stats-list'); list.innerHTML = '';
    const add = (t, vs) => {
        let h = `<div class="stat-group"><div class="stat-title">${t}</div>`;
        vs.forEach(v => h += `<div class="stat-detail"><span>${v.l}</span><span class="stat-val">${v.v}</span></div>`);
        list.innerHTML += h + `</div>`;
    };
    add('Player', [{l:'ライフ',v:s.maxLife},{l:'倍率',v:s.scoreMult.toFixed(1)}]);
    add('Ball', [{l:'威力',v:s.mainDmg},{l:'速度',v:s.mainSpeed.toFixed(1)},{l:'貫通',v:s.mainPierce},{l:'爆発',v:s.hasExp?`攻${s.mainExplodeDmg} 範${s.mainExplodeRad}`:'無'}]);
    add('Weapon', [{l:'L間隔',v:s.lsrInterval},{l:'L太さ',v:s.lsrWidth},{l:'M弾数',v:s.mslCnt},{l:'M威力',v:s.mslDmg}]);
    add('Defense', [{l:'バリア',v:s.rotCnt},{l:'トーチカ',v:s.pillCnt},{l:'子機数',v:s.satCnt}]);
    eId('equip-layer').classList.add('hidden'); eId('stats-modal').classList.remove('hidden');
}

function openInventory(slot) {
    const cat = {main:'main', sub:'sub', option:'opt', acc1:'acc', acc2:'acc'}[slot];
    const list = eId('inv-list'); list.innerHTML = '';
    const create = (id, data = null) => {
        const btn = document.createElement('button'); btn.className = 'inv-item';
        if (data) {
            btn.style.borderLeft = (data.cat==='mix'?'4px solid #8b5cf6':'4px solid #f59e0b');
            const lvl = data.level || 1;
            let eff = (data.effects||[]).map(e => `${ITEM_DEFS[e.type].short}+${e.level * lvl}`).join('/');
            btn.innerHTML = `<span class="inv-name">${data.name} [Lv.${lvl}]</span><div class="inv-eff">${eff}</div>`;
            if (!data.id.startsWith('synth_')) {
                const sell = document.createElement('button'); sell.className='btn-sell'; sell.innerText='売却';
                sell.onclick = (e) => { e.stopPropagation(); delete save.custom_items[id]; save.total_points+=500; save.save(); btn.remove(); };
                btn.appendChild(sell);
            }
        } else { btn.innerText = (id==='none'?'装備なし':`${ITEM_DEFS[id].name} [Lv.${save.getLevel(id)}]`); }
        btn.onclick = () => { save.loadout[slot]=id; save.save(); showEquipMenu(); };
        return btn;
    };
    list.appendChild(create('none'));
    GACHA_POOL.filter(k => ITEM_DEFS[k].cat === cat && save.item_counts[k] > 0).forEach(k => list.appendChild(create(k)));
    Object.values(save.synth_items).forEach(item => list.appendChild(create(item.id, item)));
    Object.values(save.custom_items).filter(item => item.cat === cat).forEach(item => list.appendChild(create(item.id, item)));
    eId('equip-layer').classList.add('hidden'); eId('inventory-modal').classList.remove('hidden');
}

function openSynth() {
    eId('equip-layer').classList.add('hidden'); eId('synth-modal').classList.remove('hidden');
    synthSelected = []; refreshSynthList();
}

function refreshSynthList() {
    const list = eId('synth-list'); list.innerHTML = '';
    let lv20 = GACHA_POOL.filter(k => save.getLevel(k) === 20);
    if (lv20.length < 2) { list.innerHTML = '<p class="sub-text">Lv.20のガチャ装備が2つ必要です</p>'; return; }
    lv20.forEach(id => {
        const btn = document.createElement('button'); btn.className = 'inv-item' + (synthSelected.includes(id)?' selected':'');
        btn.innerText = ITEM_DEFS[id].name;
        btn.onclick = () => { if(synthSelected.includes(id)) synthSelected = synthSelected.filter(i=>i!==id); else if(synthSelected.length<2) synthSelected.push(id); refreshSynthList(); };
        list.appendChild(btn);
    });
    eId('btn-synth-exec').innerText = (synthSelected.length===2?'★ 合成実行 ★':'2つ選択してください');
}

function execSynth() {
    if(synthSelected.length !== 2) return;
    let keys = [...synthSelected].sort(); let sId = 'synth_' + keys.join('_');
    if(save.synth_items[sId]) { save.synth_items[sId].level++; alert("強化成功！"); } 
    else { save.synth_items[sId] = { id:sId, cat:'mix', name:`【合】${ITEM_DEFS[keys[0]].short}&${ITEM_DEFS[keys[1]].short}`, effects:[{type:keys[0],level:1},{type:keys[1],level:1}], level:1 }; alert("合成成功！"); }
    Sound.play('powerup'); save.save(); showEquipMenu();
}

function pullGacha(isBulk) {
    const cost = 300; if (save.total_points < cost) return alert("ポイント不足");
    let pool = GACHA_POOL.filter(k => save.getLevel(k) < 20); if(pool.length===0) return alert("全カンスト済");
    let pulls = isBulk ? Math.floor(save.total_points / cost) : 1; save.total_points -= pulls * cost;
    for(let i=0; i<pulls; i++) { let id = pool[Math.floor(Math.random()*pool.length)]; save.item_counts[id] = (save.item_counts[id]||0)+1; }
    save.save(); Sound.play('powerup'); showEquipMenu(isBulk ? pulls+"回引きました" : "新装備ゲット！");
}
</script>
